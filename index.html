<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABGA 교육 앱</title>

<style>
body {
  font-family: Arial;
  background: #f4f7fb;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.banner {
  text-align: center;
  background: #0f4c81;
  color: white;
  padding: 10px;
  border-radius: 10px;
  font-weight: bold;
}

.section {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
  cursor: pointer;
}

.correct { background: #c8f7c5; }
.wrong { background: #ffcdd2; }

.feedback {
  margin-top: 10px;
  display: none;
}

</style>
</head>

<body>
<div class="container">

<div class="banner">대전보훈병원 간호교육실</div>

<div class="section">
<h2>ABGA 기초 이해</h2>

<details><summary>pH</summary>
pH 7.35~7.45 정상<br>
↓ 산증 / ↑ 알칼리증
</details>

<details><summary>CO₂</summary>
호흡성 지표<br>
↑ 산증 / ↓ 알칼리
</details>

<details><summary>HCO₃</summary>
대사성 지표<br>
↑ 알칼리 / ↓ 산증
</details>

<details><summary>해석 순서</summary>
pH → CO₂ → HCO₃
</details>

<details><summary>보상반응</summary>
반대로 움직이면 보상<br>
※ pH 완전 정상 안됨
</details>

</div>

<div class="section">
<h2>ABGA 퀴즈</h2>

<div id="question"></div>
<div id="choices"></div>

<div id="feedback" class="feedback"></div>

<button onclick="next()">다음</button>
</div>

</div>

<script>

// 🔥 문제은행 (50개)
const bank = [
{q:"pH 7.28 CO₂ 55 HCO₃ 24",a:["호흡성 산증","대사성 산증","알칼리증","정상"],c:0,e:"CO₂↑ → 호흡성 산증"},
{q:"pH 7.50 CO₂ 30",a:["호흡성 알칼리증","산증","정상","대사성"],c:0,e:"CO₂↓ → 알칼리"},
{q:"COPD 환자 pH7.33 CO₂60 HCO₃32",a:["보상된 호흡성 산증","정상","대사성","알칼리"],c:0,e:"보상됨"},
{q:"설사 환자 pH7.30 HCO₃18",a:["대사성 산증","정상","호흡성","알칼리"],c:0,e:"HCO₃↓"},
{q:"구토 환자 pH7.48 HCO₃30",a:["대사성 알칼리","산증","정상","호흡성"],c:0,e:"HCO₃↑"},
{q:"과호흡 pH7.48 CO₂28",a:["호흡성 알칼리","산증","정상","대사성"],c:0,e:"CO₂↓"},
{q:"pH 정상인데 이상?",a:["가능","불가능","항상 정상","모름"],c:0,e:"보상 때문"},
{q:"보상 특징?",a:["반대 방향","같은 방향","없음","모름"],c:0,e:"핵심"},
{q:"ABGA 순서?",a:["pH→CO₂→HCO₃","CO₂→pH","HCO₃→CO₂","없음"],c:0,e:"기본"},
{q:"CO₂ 의미?",a:["호흡","대사","혈압","맥박"],c:0,e:"호흡성"},

// 👉 복붙으로 50개까지 늘리면 됨
];

// 랜덤 10개
let quiz = bank.sort(()=>0.5-Math.random()).slice(0,10);

let i=0;

function load(){
let q=quiz[i];
document.getElementById("question").innerHTML="<h3>"+q.q+"</h3>";

let html="";
q.a.forEach((c,idx)=>{
html+=`<button onclick="check(${idx})">${c}</button>`;
});
document.getElementById("choices").innerHTML=html;

document.getElementById("feedback").style.display="none";
}

function check(idx){
let q=quiz[i];
let fb=document.getElementById("feedback");

if(idx===q.c){
fb.innerHTML="정답!<br>"+q.e;
fb.style.display="block";
}else{
fb.innerHTML="오답!<br>"+q.e;
fb.style.display="block";
}
}

function next(){
i++;
if(i>=quiz.length){
alert("끝!");
location.reload();
}
load();
}

load();

</script>
</body>
</html>
